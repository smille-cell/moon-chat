<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Chat Final</title>
    <style>
        :root { --bg: #0e1621; --side: #17212b; --acc: #2481cc; --txt: #fff; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .box { background: var(--side); padding: 30px; border-radius: 10px; text-align: center; width: 280px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #242f3d; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--acc); border: none; color: #fff; cursor: pointer; border-radius: 5px; font-weight: bold; }

        #sidebar { width: 260px; background: var(--side); border-right: 1px solid #101921; display: none; flex-direction: column; }
        #chat { flex: 1; display: none; flex-direction: column; }
        
        #msgs { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; display: flex; flex-direction: column; }
        .m { padding: 10px 15px; margin: 5px 0; border-radius: 15px; max-width: 70%; word-wrap: break-word; }
        .me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .ot { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }
        
        .u-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #101921; transition: 0.2s; }
        .u-item:hover { background: #2b3948; }
        .u-item.active { background: #2481cc; }
    </style>
</head>
<body>

<div id="auth">
    <div class="box">
        <h2>Moon Chat</h2>
        <input id="nick" placeholder="Ваш никнейм...">
        <button onclick="login()">ВОЙТИ</button>
    </div>
</div>

<div id="sidebar">
    <div style="padding:15px; font-weight:bold; border-bottom:1px solid #101921;">Люди в сети</div>
    <div id="user-list"></div>
</div>

<div id="chat">
    <div style="padding:15px; background:var(--side); font-weight:bold;" id="chat-target">Выберите чат</div>
    <ul id="msgs"></ul>
    <div style="padding:15px; display:flex; background:var(--side);">
        <input id="msg-input" placeholder="Сообщение..." style="margin:0;">
        <button onclick="send()" style="width:80px; margin-left:10px;">-></button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let targetId = "";
    let myName = "";

    function login() {
        const n = document.getElementById('nick').value;
        if(n) {
            myName = n;
            socket.emit('auth', { username: n });
        }
    }

    socket.on('auth success', () => {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('chat').style.display = 'flex';
    });

    socket.on('user list', (list) => {
        const container = document.getElementById('user-list');
        container.innerHTML = "";
        for(let id in list) {
            if(id !== socket.id) {
                const d = document.createElement('div');
                d.className = 'u-item' + (id === targetId ? ' active' : '');
                d.innerText = list[id];
                d.onclick = () => {
                    targetId = id;
                    document.getElementById('chat-target').innerText = "Чат с " + list[id];
                    document.getElementById('msgs').innerHTML = ""; // Очистка чата при смене собеседника
                    Array.from(document.querySelectorAll('.u-item')).forEach(el => el.classList.remove('active'));
                    d.classList.add('active');
                };
                container.appendChild(d);
            }
        }
    });

    function send() {
        const i = document.getElementById('msg-input');
        if(i.value && targetId) {
            socket.emit('private message', { toId: targetId, text: i.value });
            i.value = "";
        } else if (!targetId) {
            alert("Выберите пользователя слева!");
        }
    }

    socket.on('private message', (data) => {
        // Показываем сообщение, только если оно от текущего собеседника или от нас самих
        if (data.fromId === targetId || data.isSelf) {
            const mDiv = document.getElementById('msgs');
            const li = document.createElement('li');
            li.className = 'm ' + (data.isSelf ? 'me' : 'ot');
            li.innerText = data.text;
            mDiv.appendChild(li);
            mDiv.scrollTop = mDiv.scrollHeight;
        } else {
            alert("Новое сообщение от другого пользователя!");
        }
    });

    // Отправка по Enter
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') send();
    });
</script>
</body>
</html>
