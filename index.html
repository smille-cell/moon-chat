<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b0e14"> <title>Moon Chat Pro 🚀</title>
    <style>
        :root { 
            --bg: #0b0e14; 
            --glass: rgba(255, 255, 255, 0.07); 
            --accent: #64ffda; 
            --my-msg: #2563eb; 
            --text: #f1f5f9; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; } /* Убираем синее выделение в Chrome */

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            height: 100dvh; /* Динамическая высота для мобилок */
            display: flex; 
            flex-direction: column;
            overflow: hidden; 
        }

        /* Экран входа */
        #login-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #0b0e14 100%);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-box { 
            background: var(--glass); padding: 30px; border-radius: 24px; 
            border: 1px solid var(--accent); text-align: center; 
            backdrop-filter: blur(15px); width: 85%; max-width: 340px; 
        }
        .login-box input { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--accent); 
            color: white; padding: 16px; border-radius: 14px; 
            width: 100%; text-align: center; margin-bottom: 16px; font-size: 16px; outline: none;
        }

        /* Основной интерфейс */
        #main-container { display: flex; flex: 1; height: 100%; overflow: hidden; }
        
        #sidebar { 
            width: 280px; background: rgba(0,0,0,0.3); 
            border-right: 1px solid var(--glass); display: flex; flex-direction: column; 
        }

        /* Мобильный вид (активируется кнопкой) */
        body.mobile-mode #sidebar { width: 100%; height: 70px; border-right: none; border-bottom: 1px solid var(--glass); flex-direction: row; align-items: center; padding: 0 10px; flex-shrink: 0; }
        body.mobile-mode #main-container { flex-direction: column; }
        body.mobile-mode #sidebar h3 { display: none; }

        /* Сообщения */
        #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        #messages { flex: 1; overflow-y: auto; padding: 15px; list-style: none; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { 
            padding: 10px 14px; border-radius: 18px; max-width: 80%; 
            font-size: 15px; line-height: 1.4; position: relative;
        }
        .msg.other { align-self: flex-start; background: var(--glass); border-bottom-left-radius: 4px; color: #fff; }
        .msg.me { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; color: #fff; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .msg small { display: block; font-size: 11px; opacity: 0.6; margin-bottom: 3px; font-weight: bold; }

        /* Зона ввода */
        .input-area { 
            padding: 12px 16px 25px 16px; /* Больше отступ снизу для жестов iPhone/Android */
            display: flex; gap: 10px; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); border-top: 1px solid var(--glass);
        }
        .input-area input { 
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 14px; border-radius: 20px; outline: none; font-size: 16px;
        }
        .input-area button { 
            background: var(--accent); color: #000; border: none; 
            width: 48px; height: 48px; border-radius: 50%; 
            cursor: pointer; font-weight: bold; flex-shrink: 0;
        }

        .user-item { padding: 8px 12px; background: var(--glass); border-radius: 12px; margin: 0 4px; font-size: 13px; border: 1px solid transparent; }
    </style>
</head>
<body class="mobile-mode">

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--accent); margin-top: 0;">MOON CHAT</h2>
        <input id="nickname-input" placeholder="Твой ник..." maxlength="15" autocomplete="off">
        <button onclick="startChat()" style="width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; font-size: 16px;">ВОЙТИ В СИСТЕМУ</button>
        <p style="font-size: 12px; opacity: 0.5; margin-top: 15px;">v2.0 Optimized for Chrome Mobile</p>
    </div>
</div>

<div id="main-container">
    <div id="sidebar">
        <h3 style="padding: 15px; margin: 0; color: var(--accent);">В сети</h3>
        <div id="user-list" style="display: flex; flex-direction: inherit; padding: 10px;"></div>
    </div>

    <div id="chat-area">
        <ul id="messages"></ul>
        <div class="input-area">
            <input id="m" placeholder="Сообщение..." autocomplete="off">
            <button onclick="sendGeneral()">🚀</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "";

    function startChat() {
        const input = document.getElementById('nickname-input');
        const val = input.value.trim();
        if (val.length >= 2) {
            myName = val;
            document.getElementById('login-screen').style.fadeOut = "slow";
            document.getElementById('login-screen').style.display = 'none';
            socket.emit('set nickname', myName);
        }
    }

    function sendGeneral() {
        const input = document.getElementById('m');
        if (input.value.trim()) {
            socket.emit('chat message', { text: input.value });
            input.value = '';
            input.focus();
        }
    }

    socket.on('chat message', (msg) => {
        const li = document.createElement('li');
        const isMe = msg.user === myName;
        li.className = `msg ${isMe ? 'me' : 'other'}`;
        li.innerHTML = `<small>${isMe ? 'Вы' : msg.user}</small>${msg.text}`;
        
        const messages = document.getElementById('messages');
        messages.appendChild(li);
        messages.scrollTop = messages.scrollHeight;
    });

    socket.on('user list', (users) => {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        for (let id in users) {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerText = users[id];
            list.appendChild(div);
        }
    });

    // Фикс для Chrome: отправка по Enter и фокус
    document.getElementById('m').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendGeneral();
    });

    // Обработка изменения высоты (для клавиатуры в Chrome)
    window.visualViewport.addEventListener('resize', () => {
        document.body.style.height = window.visualViewport.height + 'px';
    });
</script>
</body>
</html>
