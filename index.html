<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MoonGram 🌙</title>
    <style>
        :root {
            --bg-sidebar: #17212b;
            --bg-chat: #0e1621;
            --text-main: #f5f5f5;
            --accent: #2b5278;
            --msg-own: #182533;
            --msg-other: #242f3d;
        }

        body { margin: 0; background: var(--bg-chat); color: var(--text-main); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 300px; background: var(--bg-sidebar); border-right: 1px solid #101921; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; }
        .search-input { width: 100%; background: #242f3d; border: none; padding: 10px; border-radius: 8px; color: white; outline: none; box-sizing: border-box; }

        .groups-tabs { display: flex; padding: 0 15px 10px; gap: 10px; }
        .tab-btn { background: var(--accent); border: none; color: white; padding: 6px; border-radius: 5px; cursor: pointer; flex: 1; font-size: 12px; font-weight: bold; }

        #user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 12px 15px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .user-item:hover { background: #202b36; }
        .user-item.active { background: var(--accent); }
        .avatar { width: 45px; height: 45px; background: #5288c1; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }

        /* Chat area */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 15px 20px; background: var(--bg-sidebar); border-bottom: 1px solid #101921; font-weight: bold; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); }
        
        .msg { padding: 8px 14px; border-radius: 12px; max-width: 75%; position: relative; font-size: 15px; line-height: 1.4; }
        .msg.other { background: var(--msg-other); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.own { background: var(--msg-own); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-time { font-size: 11px; color: #6c7883; margin-top: 4px; text-align: right; }
        .msg-author { font-size: 12px; color: #5288c1; font-weight: bold; margin-bottom: 4px; }

        .input-area { padding: 15px 20px; background: var(--bg-sidebar); display: flex; align-items: center; gap: 15px; }
        #msgInput { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        #sendBtn { color: #5288c1; cursor: pointer; font-weight: bold; user-select: none; }

        /* Auth */
        #auth-overlay { position: fixed; inset: 0; background: #0e1621; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--bg-sidebar); padding: 40px; border-radius: 15px; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid var(--accent); background: #242f3d; color: white; box-sizing: border-box; outline: none; }
        .auth-card button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>MoonGram</h2>
            <input type="text" id="nickname" placeholder="Enter Username..." autocomplete="off">
            <button onclick="login()">START MESSAGING</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <input type="text" class="search-input" id="searchInput" placeholder="Search users...">
        </div>
        <div class="groups-tabs">
            <button class="tab-btn" onclick="joinRoom('Global')">#Global</button>
            <button class="tab-btn" onclick="joinRoom('Devs')">#Devs</button>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="main">
        <div class="chat-header" id="chat-title">Select a chat</div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
            <div id="sendBtn" onclick="send()">SEND</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myNick = "";
        let targetUser = null;
        let currentRoom = null;

        function login() {
            const nick = document.getElementById('nickname').value.trim();
            if(nick) {
                myNick = nick;
                socket.emit('auth', nick);
                document.getElementById('auth-overlay').classList.add('hidden');
            }
        }

        function send() {
            const text = document.getElementById('msgInput').value.trim();
            if(!text) return;

            if (targetUser) {
                // Личное сообщение
                socket.emit('private_msg', { to: targetUser, msg: text });
                addMessage(myNick, text, 'own'); // Сразу отображаем у себя
            } else if (currentRoom) {
                // Групповое сообщение
                socket.emit('group_msg', { room: currentRoom, msg: text });
            }
            document.getElementById('msgInput').value = '';
        }

        socket.on('chat_msg', (data) => {
            if (data.type === 'private' && targetUser === data.from) {
                // Если пришло ЛС и открыт чат с этим человеком
                addMessage(data.from, data.text, 'other');
            } else if (data.room && data.room === currentRoom) {
                // Если пришло сообщение в текущую группу
                addMessage(data.from, data.text, data.from === myNick ? 'own' : 'other');
            }
        });

        function addMessage(from, text, type) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.className = `msg ${type}`;
            div.innerHTML = `
                ${type === 'other' ? `<div class="msg-author">${from}</div>` : ''}
                <div>${text}</div>
                <div class="msg-time">${time}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        socket.on('update_online', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = users.filter(u => u !== myNick).map(u => `
                <div class="user-item ${targetUser === u ? 'active' : ''}" onclick="setTarget('${u}')">
                    <div class="avatar">${u[0].toUpperCase()}</div>
                    <div>
                        <div style="font-weight: bold;">${u}</div>
                        <div style="font-size: 12px; color: #7f91a4;">online</div>
                    </div>
                </div>
            `).join('');
        });

        function setTarget(nick) {
            targetUser = nick;
            currentRoom = null;
            document.getElementById('chat-title').innerText = `Chat with ${nick}`;
            document.getElementById('messages').innerHTML = "";
            updateActiveUI();
        }

        function joinRoom(room) {
            targetUser = null;
            currentRoom = room;
            document.getElementById('chat-title').innerText = `Group: #${room}`;
            document.getElementById('messages').innerHTML = "";
            socket.emit('join_room', room);
            updateActiveUI();
        }

        function updateActiveUI() {
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        });

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
