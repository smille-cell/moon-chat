<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Chat Auth 🚀</title>
    <style>
        :root { --bg: #0b0e14; --accent: #64ffda; --glass: rgba(255, 255, 255, 0.07); }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Экран входа */
        #auth-screen { position: fixed; inset: 0; background: #0b0e14; display: flex; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; }
        .auth-box { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid var(--accent); width: 85%; max-width: 320px; text-align: center; }
        input { background: rgba(0,0,0,0.3); border: 1px solid var(--accent); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        
        /* Поиск и список */
        #sidebar { background: rgba(0,0,0,0.3); padding: 10px; border-bottom: 1px solid var(--glass); }
        .search-box { margin-bottom: 10px; }
        .user-list { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
        .user-item { background: var(--glass); padding: 8px 15px; border-radius: 10px; font-size: 13px; white-space: nowrap; }

        /* Чат */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; list-style: none; }
        .msg { padding: 10px; border-radius: 15px; max-width: 80%; font-size: 15px; }
        .msg.me { align-self: flex-end; background: #2563eb; }
        .msg.other { align-self: flex-start; background: var(--glass); }
        
        .input-area { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="auth-title">ВХОД</h2>
        <input id="auth-user" placeholder="Логин">
        <input id="auth-pass" type="password" placeholder="Пароль">
        <button id="auth-btn" onclick="handleAuth()">ВОЙТИ</button>
        <p onclick="toggleAuthMode()" id="auth-toggle" style="font-size: 12px; margin-top: 15px; color: var(--accent); cursor:pointer">Нет аккаунта? Регистрация</p>
    </div>
</div>

<div id="sidebar">
    <div class="search-box">
        <input id="user-search" placeholder="🔍 Поиск по юзеру..." oninput="filterUsers()">
    </div>
    <div id="user-list" class="user-list"></div>
</div>

<ul id="messages"></ul>

<div class="input-area">
    <input id="m" placeholder="Сообщение..." autocomplete="off">
    <button onclick="sendMsg()">🚀</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "";
    let isRegMode = false;
    let allOnlineUsers = {};

    function toggleAuthMode() {
        isRegMode = !isRegMode;
        document.getElementById('auth-title').innerText = isRegMode ? "РЕГИСТРАЦИЯ" : "ВХОД";
        document.getElementById('auth-btn').innerText = isRegMode ? "СОЗДАТЬ" : "ВОЙТИ";
        document.getElementById('auth-toggle').innerText = isRegMode ? "Уже есть аккаунт? Вход" : "Нет аккаунта? Регистрация";
    }

    function handleAuth() {
        const username = document.getElementById('auth-user').value;
        const password = document.getElementById('auth-pass').value;
        if (username.length < 2 || password.length < 3) return alert("Слишком коротко!");
        socket.emit('auth', { username, password, isReg: isRegMode });
    }

    socket.on('auth success', (name) => {
        myName = name;
        document.getElementById('auth-screen').style.display = 'none';
        socket.emit('set nickname', myName);
    });

    socket.on('auth error', (msg) => alert(msg));

    function sendMsg() {
        const input = document.getElementById('m');
        if (input.value) {
            socket.emit('chat message', { text: input.value });
            input.value = '';
        }
    }

    socket.on('chat message', (msg) => {
        const li = document.createElement('li');
        const isMe = msg.user === myName;
        li.className = `msg ${isMe ? 'me' : 'other'}`;
        li.innerHTML = `<small style="display:block;font-size:10px;opacity:0.6">${msg.user}</small>${msg.text}`;
        document.getElementById('messages').appendChild(li);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    socket.on('user list', (users) => {
        allOnlineUsers = users;
        renderUsers(users);
    });

    function renderUsers(users) {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        for (let id in users) {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerText = users[id];
            list.appendChild(div);
        }
    }

    function filterUsers() {
        const query = document.getElementById('user-search').value.toLowerCase();
        const filtered = {};
        for (let id in allOnlineUsers) {
            if (allOnlineUsers[id].toLowerCase().includes(query)) {
                filtered[id] = allOnlineUsers[id];
            }
        }
        renderUsers(filtered);
    }
</script>
</body>
</html>
