<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Messenger | Premium</title>
    <style>
        :root { --bg: #0b0e14; --accent: #38bdf8; --glass: rgba(255, 255, 255, 0.05); --blur: blur(15px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100dvh; overflow: hidden; display: flex; }

        /* ИНТРО С АНИМАЦИЕЙ */
        #intro { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.8s; }
        .slide { display: none; text-align: center; animation: zoomIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .slide.active { display: block; }
        .icon { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--accent)); }
        
        .btn-group { display: none; flex-direction: column; gap: 12px; margin-top: 40px; width: 100%; max-width: 280px; animation: fadeIn 1s; }
        .b-main { padding: 16px; border-radius: 30px; border: none; background: var(--accent); color: #000; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .b-sec { padding: 14px; border-radius: 30px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: 700; cursor: pointer; }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* СТЕКЛЯННЫЙ ИНТЕРФЕЙС ВХОДА */
        #auth { position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b, #0b0e14); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .glass-box { background: var(--glass); backdrop-filter: var(--blur); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 340px; text-align: center; }
        input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 16px; border-radius: 12px; width: 100%; margin-bottom: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.5); }

        /* ОСНОВНОЙ ЧАТ (GLASS STYLE) */
        #sidebar { width: 320px; background: rgba(15, 23, 42, 0.8); backdrop-filter: var(--blur); border-right: 1px solid rgba(255,255,255,0.05); display: none; flex-direction: column; }
        #chat { flex: 1; display: none; flex-direction: column; background: url('https://w.wallhaven.cc/full/ex/wallhaven-ex9698.png') center/cover; }
        
        .contact { padding: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .contact:hover { background: rgba(255,255,255,0.05); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-right: 12px; }

        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(11, 14, 20, 0.85); }
        .m { padding: 10px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; backdrop-filter: var(--blur); }
        .me { align-self: flex-end; background: #007aff; color: #fff; border-bottom-right-radius: 4px; }
        .ot { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        .input-bar { padding: 15px; background: rgba(15, 23, 42, 0.9); backdrop-filter: var(--blur); display: flex; gap: 10px; }

        @media (max-width: 600px) {
            #sidebar { width: 100%; }
            #chat { display: none; position: fixed; inset: 0; z-index: 100; }
            #chat.open { display: flex; }
        }
    </style>
</head>
<body>

<div id="intro">
    <div class="slide active" id="s1"><div class="icon">🛰️</div><h2>Moon Messenger</h2><p>Ваши данные под защитой звезд.</p></div>
    <div class="slide" id="s2"><div class="icon">💎</div><h2>Glassmorphism UI</h2><p>Новый взгляд на привычное общение.</p></div>
    <div class="slide" id="s3"><div class="icon">🌕</div><h2>Добро пожаловать</h2><p>Присоединяйся к сообществу.</p></div>
    <div class="btn-group" id="i-btns">
        <button class="b-main" onclick="openAuth(true)">Создать аккаунт</button>
        <button class="b-sec" onclick="openAuth(false)">Уже с нами? Войти</button>
    </div>
</div>

<div id="auth">
    <div class="glass-box">
        <h2 id="a-title" style="color:var(--accent)">ВХОД</h2>
        <input id="u" placeholder="Логин">
        <input id="p" type="password" placeholder="Пароль">
        <button class="b-main" style="width:100%" onclick="submitAuth()">ПРОДОЛЖИТЬ</button>
        <p onclick="toggleAuth()" id="a-hint" style="color:var(--accent); cursor:pointer; font-size:13px; margin-top:20px;">Создать новый аккаунт</p>
    </div>
</div>

<div id="sidebar">
    <div style="padding:20px;"><input id="search" placeholder="🔍 Поиск контактов..." oninput="renderUsers()" style="margin:0;"></div>
    <div id="user-list" style="overflow-y:auto; flex:1;"></div>
</div>

<div id="chat">
    <div style="padding:15px; background:rgba(15,23,42,0.95); display:flex; align-items:center; border-bottom:1px solid rgba(255,255,255,0.05);">
        <button onclick="closeChat()" id="back" style="display:none; background:none; border:none; color:var(--accent); font-size:24px; margin-right:15px;">←</button>
        <b id="chat-name">Выберите собеседника</b>
    </div>
    <div id="msgs"></div>
    <div class="input-bar" id="input-zone" style="display:none">
        <input id="m" placeholder="Написать сообщение..." style="margin:0; border-radius:30px;">
        <button onclick="sendMsg()" style="width:50px; height:50px; border-radius:50%; background:var(--accent); border:none; font-size:20px; cursor:pointer;">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isReg = false, myName = "", targetId = "", online = {}, chats = [];

    // Анимация слайдов
    let step = 1;
    const timer = setInterval(() => {
        document.getElementById(`s${step}`).classList.remove('active');
        step++;
        if(step > 3) {
            clearInterval(timer);
            document.getElementById('s3').classList.add('active');
            document.getElementById('i-btns').style.display = 'flex';
        } else {
            document.getElementById(`s${step}`).classList.add('active');
        }
    }, 2000);

    function openAuth(reg) {
        isReg = reg; updateAuthUI();
        document.getElementById('intro').style.opacity = '0';
        setTimeout(() => { document.getElementById('intro').remove(); document.getElementById('auth').style.display = 'flex'; }, 600);
    }
    function toggleAuth() { isReg = !isReg; updateAuthUI(); }
    function updateAuthUI() {
        document.getElementById('a-title').innerText = isReg ? "РЕГИСТРАЦИЯ" : "ВХОД";
        document.getElementById('a-hint').innerText = isReg ? "Есть аккаунт? Войти" : "Создать новый аккаунт";
    }

    function submitAuth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(u && p) socket.emit('auth', { username: u, password: p, isReg: isReg });
    }

    socket.on('auth success', n => {
        myName = n; document.getElementById('auth').remove();
        document.getElementById('sidebar').style.display = 'flex';
        if(window.innerWidth > 600) document.getElementById('chat').style.display = 'flex';
        socket.emit('set nickname', n);
    });

    socket.on('auth error', m => alert(m));
    socket.on('user list', u => { online = u; renderUsers(); });

    function renderUsers() {
        const q = document.getElementById('search').value.toLowerCase();
        const list = document.getElementById('user-list'); list.innerHTML = '';
        let show = q ? Object.keys(online).filter(id => online[id] !== myName && online[id].toLowerCase().includes(q)) : chats;

        show.forEach(id => {
            if(!online[id]) return;
            const d = document.createElement('div'); d.className = 'contact';
            d.innerHTML = `<div class="avatar">${online[id][0].toUpperCase()}</div><b>${online[id]}</b>`;
            d.onclick = () => {
                targetId = id; if(!chats.includes(id)) chats.push(id);
                document.getElementById('chat-name').innerText = online[id];
                document.getElementById('msgs').innerHTML = '';
                document.getElementById('input-zone').style.display = 'flex';
                document.getElementById('chat').classList.add('open');
                if(window.innerWidth < 600) document.getElementById('back').style.display = 'block';
                renderUsers();
            };
            list.appendChild(d);
        });
    }

    function sendMsg() {
        const i = document.getElementById('m');
        if(i.value && targetId) { socket.emit('private message', { toId: targetId, text: i.value }); i.value = ''; }
    }

    socket.on('private message', d => {
        if(!chats.includes(d.fromId)) { chats.push(d.fromId); renderUsers(); }
        if(d.fromId === targetId || d.isSelf) {
            const mDiv = document.getElementById('msgs');
            mDiv.innerHTML += `<div class="m ${d.isSelf?'me':'ot'}">${d.text}</div>`;
            mDiv.scrollTop = mDiv.scrollHeight;
        }
    });

    function closeChat() { document.getElementById('chat').classList.remove('open'); }
    document.getElementById('m').addEventListener('keypress', e => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
