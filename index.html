<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Messenger</title>
    <style>
        :root { --bg: #0b0e14; --accent: #38bdf8; --glass: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100dvh; display: flex; overflow: hidden; }

        /* ИНТРО */
        #intro-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.8s ease; }
        .intro-slide { display: none; text-align: center; animation: fadeIn 1s; }
        .intro-slide.active { display: block; }
        .intro-icon { font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent)); }
        .intro-title { color: var(--accent); font-size: 24px; margin-bottom: 10px; font-weight: bold; }
        
        #start-btn { margin-top: 30px; padding: 12px 40px; border-radius: 25px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ВХОД */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; align-items: center; justify-content: center; }
        .auth-box { background: #1e293b; padding: 30px; border-radius: 25px; width: 320px; text-align: center; border: 1px solid var(--accent); }
        input { background: #0f172a; border: 1px solid #334155; color: #fff; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        /* ЧАТ */
        #sidebar { width: 300px; border-right: 1px solid var(--glass); display: none; flex-direction: column; background: #0f172a; }
        #chat-main { flex: 1; display: none; flex-direction: column; background: #0b0e14; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; list-style: none; margin: 0; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 75%; }
        .msg.me { align-self: flex-end; background: #0369a1; }
        .msg.other { align-self: flex-start; background: #334155; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #1e293b; }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div class="intro-slide active" id="slide1"><div class="intro-icon">🛡️</div><div class="intro-title">Конфиденциальность</div></div>
    <div class="intro-slide" id="slide2"><div class="intro-icon">🔐</div><div class="intro-title">Moon Shield</div></div>
    <div class="intro-slide" id="slide3"><div class="intro-icon">🌕</div><div class="intro-title">Moon Messenger</div></div>
    <button id="start-btn" onclick="goToAuth()">НАЧАТЬ</button>
</div>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="atitle" style="color: var(--accent)">ВХОД</h2>
        <input id="u" placeholder="Логин">
        <input id="p" type="password" placeholder="Пароль">
        <button id="abtn" onclick="sendAuth()">ВОЙТИ</button>
        <p id="amode" onclick="switchMode()" style="font-size:12px; color:var(--accent); cursor:pointer; margin-top:15px;">Нет аккаунта? Регистрация</p>
    </div>
</div>

<div id="sidebar">
    <div style="padding:15px; border-bottom:1px solid var(--glass)">Онлайн</div>
    <div id="user-list"></div>
</div>
<div id="chat-main">
    <div id="chat-header" style="padding:15px; background:#1e293b;"><span id="chat-with">Выберите чат</span></div>
    <ul id="messages"></ul>
    <div class="input-area"><input id="m" placeholder="Сообщение..."><button onclick="send()">➤</button></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isReg = false;
    let myName = "", targetId = "";

    // Слайды
    let curS = 1;
    const sInt = setInterval(() => {
        document.getElementById(`slide${curS}`).classList.remove('active');
        curS++;
        if(curS > 3) { clearInterval(sInt); document.getElementById('slide3').classList.add('active'); document.getElementById('start-btn').style.display='block'; }
        else document.getElementById(`slide${curS}`).classList.add('active');
    }, 2000);

    function goToAuth() { document.getElementById('intro-overlay').remove(); document.getElementById('auth-screen').style.display='flex'; }
    
    function switchMode() {
        isReg = !isReg;
        document.getElementById('atitle').innerText = isReg ? "РЕГИСТРАЦИЯ" : "ВХОД";
        document.getElementById('abtn').innerText = isReg ? "СОЗДАТЬ" : "ВОЙТИ";
        document.getElementById('amode').innerText = isReg ? "Уже есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
    }

    function sendAuth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(u && p) socket.emit('auth', { username: u, password: p, isReg: isReg });
    }

    socket.on('auth success', n => {
        myName = n;
        document.getElementById('auth-screen').remove();
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('chat-main').style.display = 'flex';
        socket.emit('set nickname', myName);
    });

    socket.on('auth error', m => alert(m));

    socket.on('user list', u => {
        const list = document.getElementById('user-list'); list.innerHTML = '';
        for(let id in u) if(u[id] !== myName) {
            const d = document.createElement('div');
            d.style.padding = '15px'; d.style.cursor = 'pointer'; d.innerText = u[id];
            d.onclick = () => { targetId = id; document.getElementById('chat-with').innerText = u[id]; document.getElementById('messages').innerHTML = ''; };
            list.appendChild(d);
        }
    });

    function send() {
        const i = document.getElementById('m');
        if(i.value && targetId) { socket.emit('private message', { toId: targetId, text: i.value }); i.value = ''; }
    }

    socket.on('private message', d => {
        if(d.fromId === targetId || d.isSelf) {
            const li = document.createElement('li');
            li.className = `msg ${d.isSelf ? 'me' : 'other'}`;
            li.innerText = d.text;
            document.getElementById('messages').appendChild(li);
        }
    });
</script>
</body>
</html>
