<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Chat Pro 🚀</title>
    <style>
        :root { --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.05); --accent: #64ffda; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; transition: 0.3s; }

        /* Мобильный режим (через класс) */
        body.mobile-mode { flex-direction: column; }
        body.mobile-mode #sidebar { width: 100%; height: 60px; border-right: none; border-bottom: 1px solid var(--glass); overflow-x: auto; flex-direction: row; align-items: center; padding: 5px 15px; }
        body.mobile-mode #sidebar h3 { display: none; }
        body.mobile-mode .user-item { margin: 0 5px; white-space: nowrap; font-size: 13px; padding: 8px; }

        /* Экран входа */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #0b0e14 100%);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; backdrop-filter: blur(10px); width: 280px; }
        .login-box input { background: rgba(0,0,0,0.3); border: 1px solid var(--accent); color: white; padding: 12px; border-radius: 8px; outline: none; margin-bottom: 15px; width: 80%; text-align: center; }
        
        .mobile-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 15px; font-size: 12px; padding: 8px; width: 100%; }

        /* Боковая панель */
        #sidebar { width: 260px; background: rgba(0,0,0,0.4); border-right: 1px solid var(--glass); padding: 20px; display: flex; flex-direction: column; transition: 0.3s; }
        .user-item { padding: 12px; margin: 5px 0; background: var(--glass); border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .user-item:hover { border-color: var(--accent); background: rgba(100, 255, 218, 0.1); }

        /* Основной чат */
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; }
        .msg { background: var(--glass); padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 85%; border-left: 4px solid var(--accent); font-size: 15px; }

        /* Поле ввода */
        .input-area { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); }
        input { flex: 1; background: var(--glass); border: 1px solid var(--glass); color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Окно ЛС (адаптивное) */
        #private-window { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; height: 350px; background: #161b22; border: 1px solid var(--accent);
            border-radius: 20px; flex-direction: column; z-index: 101; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        #pm-header { padding: 15px; background: var(--accent); color: black; font-weight: bold; border-radius: 19px 19px 0 0; display: flex; justify-content: space-between; }
        #pm-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color: var(--accent); margin: 0 0 15px 0;">MOON CHAT</h1>
        <input id="nickname-input" placeholder="Ваш ник..." maxlength="15">
        <button onclick="startChat()" style="width: 100%; padding: 12px;">ВОЙТИ</button>
        <button class="mobile-btn" id="toggle-mobile" onclick="toggleMobileView()">📱 MOBILE VERSION: OFF</button>
    </div>
</div>

<div id="sidebar">
    <h3 style="color: var(--accent);">Online</h3>
    <div id="user-list"></div>
</div>

<div id="chat-area">
    <ul id="messages"></ul>
    <div class="input-area">
        <input id="m" placeholder="Сообщение..." autocomplete="off">
        <button onclick="sendGeneral()">➤</button>
    </div>
</div>

<div id="private-window">
    <div id="pm-header"><span id="target-name">ЛС</span> <span onclick="closePM()" style="cursor:pointer">✖</span></div>
    <div id="pm-messages"></div>
    <div class="input-area" style="padding: 10px;">
        <input id="pm-input" placeholder="Лично...">
        <button onclick="sendPrivate()">📩</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isMobile = false;
    let myName = "";

    function toggleMobileView() {
        isMobile = !isMobile;
        const btn = document.getElementById('toggle-mobile');
        if(isMobile) {
            document.body.classList.add('mobile-mode');
            btn.innerText = "📱 MOBILE VERSION: ON";
            btn.style.background = "rgba(100, 255, 218, 0.2)";
        } else {
            document.body.classList.remove('mobile-mode');
            btn.innerText = "📱 MOBILE VERSION: OFF";
            btn.style.background = "transparent";
        }
    }

    function startChat() {
        const input = document.getElementById('nickname-input');
        if (input.value.trim().length > 1) {
            myName = input.value;
            document.getElementById('login-screen').style.display = 'none';
            socket.emit('set nickname', myName);
        }
    }

    // Остальной JS код (отправка, списки и т.д. — как был)
    socket.on('user list', (users) => {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        for (let id in users) {
            if (id !== socket.id) {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `🛰️ ${users[id]}`;
                div.onclick = () => openPM(id, users[id]);
                list.appendChild(div);
            }
        }
    });

    function sendGeneral() {
        const input = document.getElementById('m');
        if (input.value) {
            socket.emit('chat message', { text: input.value });
            input.value = '';
        }
    }

    socket.on('chat message', (msg) => {
        const li = document.createElement('li');
        li.className = 'msg';
        li.innerHTML = `<b style="color:var(--accent); cursor:pointer" onclick="openPM('${msg.fromId}', '${msg.user}')">${msg.user}:</b> ${msg.text}`;
        document.getElementById('messages').appendChild(li);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    function openPM(id, name) {
        window.currentTargetId = id;
        document.getElementById('target-name').innerText = "ЛС: " + name;
        document.getElementById('private-window').style.display = 'flex';
    }
    function closePM() { document.getElementById('private-window').style.display = 'none'; }

    function sendPrivate() {
        const input = document.getElementById('pm-input');
        if (input.value && window.currentTargetId) {
            socket.emit('private message', { toId: window.currentTargetId, text: input.value });
            input.value = '';
        }
    }

    socket.on('private message', (data) => {
        const p = document.createElement('p');
        p.innerHTML = `<b style="color:var(--accent)">${data.fromName}:</b> ${data.text}`;
        document.getElementById('pm-messages').appendChild(p);
        document.getElementById('private-window').style.display = 'flex';
    });
</script>
</body>
</html>
