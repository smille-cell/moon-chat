<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Chat | Global</title>
    <style>
        :root { --bg: #0b1118; --acc: #38bdf8; --glass: rgba(255, 255, 255, 0.03); --blur: blur(25px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100dvh; overflow: hidden; }

        /* ИНТРО */
        #intro { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 1s ease; }
        .logo-ani { text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }

        /* ВХОД */
        #auth-screen { position: fixed; inset: 0; background: #0b1118; z-index: 4000; display: none; align-items: center; justify-content: center; }
        .glass { background: var(--glass); backdrop-filter: var(--blur); padding: 30px; border-radius: 25px; width: 90%; max-width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn { background: var(--acc); color: #000; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        /* ЧАТ */
        #main-ui { display: none; flex-direction: column; height: 100dvh; }
        header { padding: 15px; background: rgba(23, 33, 43, 0.8); backdrop-filter: var(--blur); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: radial-gradient(circle at bottom, #111a24, #0b1118); }
        
        .m { padding: 10px 14px; border-radius: 18px; max-width: 85%; position: relative; animation: msgIn 0.3s ease; line-height: 1.4; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 4px; }
        .ot { align-self: flex-start; background: #182533; border-bottom-left-radius: 4px; }
        
        .input-area { padding: 15px; background: rgba(23, 33, 43, 0.9); display: flex; gap: 10px; align-items: center; }
        #m { margin: 0; border-radius: 25px; border: none; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="intro">
    <div class="logo-ani">
        <div style="font-size: 70px;">🌕</div>
        <h2 style="letter-spacing: 5px;">MOON CHAT</h2>
    </div>
</div>

<div id="auth-screen">
    <div class="glass">
        <h2 id="at">Moon Login</h2>
        <input id="u" placeholder="Логин">
        <input id="p" type="password" placeholder="Пароль">
        <button class="btn" onclick="auth()">ВОЙТИ</button>
        <p onclick="isReg=!isReg; document.getElementById('at').innerText=isReg?'Регистрация':'Вход'" style="cursor:pointer; font-size:12px; color:var(--acc); margin-top:15px;">Создать аккаунт</p>
    </div>
</div>

<div id="main-ui">
    <header>
        <b style="letter-spacing: 2px;">MOON GLOBAL</b>
        <span onclick="localStorage.clear(); location.reload()" style="font-size:12px; opacity:0.5; cursor:pointer;">Выход</span>
    </header>
    <div id="msgs"></div>
    <div class="input-area">
        <label for="f-in" style="cursor:pointer; font-size:22px;">📎</label>
        <input type="file" id="f-in" style="display:none" onchange="upF(this)">
        <input id="m" placeholder="Написать всем...">
        <button onclick="send()" style="background:none; border:none; color:var(--acc); font-size:26px;">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isReg = false, myName = localStorage.getItem('m_user') || "";

    window.onload = () => {
        if(myName) {
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => { document.getElementById('intro').remove(); showUI(); }, 800);
            }, 1200);
            socket.emit('set nickname', myName);
        } else {
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => { document.getElementById('intro').remove(); document.getElementById('auth-screen').style.display = 'flex'; }, 800);
            }, 1500);
        }
    };

    function auth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(u && p) socket.emit('auth', { username: u, password: p, isReg: isReg });
    }

    socket.on('auth success', n => { localStorage.setItem('m_user', n); location.reload(); });
    socket.on('auth error', m => alert(m));

    function showUI() { document.getElementById('main-ui').style.display = 'flex'; }

    function send() {
        const i = document.getElementById('m');
        if(!i.value) return;
        socket.emit('message', { text: i.value });
        i.value = '';
    }

    function upF(el) {
        const f = el.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = e => {
            const type = f.type.split('/')[0];
            socket.emit('message', { text: f.name, fileData: e.target.result, fileType: type });
        };
        r.readAsDataURL(f);
    }

    socket.on('message', d => {
        const m = document.createElement('div');
        const isSelf = d.from === myName;
        m.className = `m ${isSelf ? 'me' : 'ot'}`;
        
        let content = d.text;
        if(d.fileData) {
            if(d.fileType === 'image') content = `<img src="${d.fileData}" style="max-width:100%; border-radius:10px;">`;
            else if(d.fileType === 'video') content = `<video src="${d.fileData}" controls style="max-width:100%; border-radius:10px;"></video>`;
            else content = `<a href="${d.fileData}" download style="color:var(--acc)">📄 ${d.text}</a>`;
        }

        m.innerHTML = `<small style="display:block; font-size:10px; opacity:0.5; margin-bottom:4px;">${d.from}</small>
                       ${content}
                       <div style="font-size:9px; opacity:0.3; text-align:right; margin-top:4px;">${d.time}</div>`;
        
        document.getElementById('msgs').appendChild(m);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    });
</script>
</body>
</html>
