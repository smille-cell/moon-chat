<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Messenger</title>
    <style>
        :root { --bg: #0b0e14; --sidebar-bg: #17212b; --chat-bg: #0e1621; --accent: #38bdf8; --text: #f5f5f5; --glass: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100dvh; display: flex; overflow: hidden; }

        /* ИНТРО-АНИМАЦИЯ */
        #intro-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.6s ease; }
        .intro-slide { display: none; text-align: center; animation: slideUp 0.5s ease; }
        .intro-slide.active { display: block; }
        .intro-icon { font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--accent)); }
        .intro-title { color: var(--accent); font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .intro-text { opacity: 0.6; font-size: 15px; max-width: 260px; line-height: 1.4; }
        
        .btn-group { display: none; flex-direction: column; gap: 12px; margin-top: 30px; width: 100%; max-width: 280px; }
        .btn-prime { padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-sub { padding: 12px; border-radius: 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2500; display: none; align-items: center; justify-content: center; }
        .auth-box { width: 90%; max-width: 320px; text-align: center; }
        input { background: #242f3d; border: 1px solid #2f3947; color: #fff; padding: 14px; border-radius: 10px; width: 100%; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--accent); }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        #sidebar { width: 300px; background: var(--sidebar-bg); border-right: 1px solid #101921; display: none; flex-direction: column; z-index: 10; }
        #chat-main { flex: 1; background: var(--chat-bg); display: none; flex-direction: column; position: relative; }

        /* Поиск */
        .search-container { padding: 10px; }
        #user-search { background: #242f3d; border-radius: 8px; font-size: 14px; margin: 0; }

        /* Контакты */
        #user-list { flex: 1; overflow-y: auto; }
        .contact { padding: 12px 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .contact:hover { background: #2b3948; }
        .contact.active { background: #2b5278; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; font-size: 18px; }

        /* Сообщения */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; list-style: none; margin: 0; }
        .msg { padding: 8px 14px; border-radius: 12px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }

        .input-area { padding: 10px 15px; display: flex; gap: 10px; background: var(--sidebar-bg); align-items: center; }
        .input-area input { margin: 0; border-radius: 20px; padding: 10px 15px; }
        .send-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; padding: 0; }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            #sidebar { width: 100%; display: none; }
            #chat-main { 
                display: none; position: fixed; inset: 0; z-index: 100; 
            }
            #chat-main.open { display: flex; }
            #sidebar.active { display: flex; }
            #back-btn { display: block !important; }
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div class="intro-slide active" id="s1"><div class="intro-icon">🛡️</div><div class="intro-title">Moon Messenger</div><div class="intro-text">Безопасность превыше всего.</div></div>
    <div class="intro-slide" id="s2"><div class="intro-icon">🚀</div><div class="intro-title">Скорость</div><div class="intro-text">Доставка сообщений в один миг.</div></div>
    <div class="intro-slide" id="s3"><div class="intro-icon">🌕</div><div class="intro-title">Готовы?</div><div class="intro-text">Ваш личный космос в кармане.</div></div>
    
    <div class="btn-group" id="intro-btns">
        <button class="btn-prime" onclick="openAuth(true)">СОЗДАТЬ АККАУНТ</button>
        <button class="btn-sub" onclick="openAuth(false)">УЖЕ БЫЛИ С НАМИ? ВОЙТИ</button>
    </div>
</div>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="a-head" style="color:var(--accent)">ВХОД</h2>
        <input id="u" placeholder="Логин">
        <input id="p" type="password" placeholder="Пароль">
        <button class="btn-prime" style="width:100%" onclick="doAuth()">ПРОДОЛЖИТЬ</button>
        <p id="a-hint" onclick="swapAuth()" style="color:var(--accent); cursor:pointer; font-size:13px; margin-top:15px;">Создать аккаунт</p>
    </div>
</div>

<div id="sidebar">
    <div class="search-container"><input id="user-search" placeholder="Поиск людей..." oninput="refreshList()"></div>
    <div id="user-list"></div>
</div>

<div id="chat-main">
    <div style="padding:10px 15px; background:var(--sidebar-bg); display:flex; align-items:center; border-bottom:1px solid #101921;">
        <button onclick="goBack()" id="back-btn" style="display:none; background:none; border:none; color:var(--accent); font-size:20px; margin-right:10px;">←</button>
        <b id="cur-chat-name">Выберите чат</b>
    </div>
    <ul id="messages"></ul>
    <div class="input-area" id="input-zone" style="display:none">
        <input id="m" placeholder="Написать сообщение..." autocomplete="off">
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isReg = false, myName = "", targetId = "", allOnline = {}, myChats = [];

    // Анимация
    let slide = 1;
    const timer = setInterval(() => {
        document.getElementById(`s${slide}`).classList.remove('active');
        slide++;
        if(slide > 3) {
            clearInterval(timer);
            document.getElementById('s3').classList.add('active');
            document.getElementById('intro-btns').style.display = 'flex';
        } else document.getElementById(`s${slide}`).classList.add('active');
    }, 1500);

    function openAuth(reg) {
        isReg = reg; swapAuthUI();
        document.getElementById('intro-overlay').style.opacity = '0';
        setTimeout(() => { document.getElementById('intro-overlay').remove(); document.getElementById('auth-screen').style.display='flex'; }, 500);
    }
    function swapAuth() { isReg = !isReg; swapAuthUI(); }
    function swapAuthUI() {
        document.getElementById('a-head').innerText = isReg ? "РЕГИСТРАЦИЯ" : "ВХОД";
        document.getElementById('a-hint').innerText = isReg ? "Уже есть аккаунт? Войти" : "Создать аккаунт";
    }

    function doAuth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(u && p) socket.emit('auth', { username: u, password: p, isReg: isReg });
    }

    socket.on('auth success', n => {
        myName = n;
        document.getElementById('auth-screen').remove();
        document.getElementById('sidebar').classList.add('active');
        if(window.innerWidth > 600) document.getElementById('chat-main').style.display = 'flex';
        socket.emit('set nickname', myName);
    });

    socket.on('auth error', m => alert(m));
    socket.on('user list', u => { allOnline = u; refreshList(); });

    function refreshList() {
        const q = document.getElementById('user-search').value.toLowerCase();
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        
        let toShow = q ? Object.keys(allOnline).filter(id => allOnline[id] !== myName && allOnline[id].toLowerCase().includes(q)) : myChats;

        if(toShow.length === 0) {
            list.innerHTML = `<p style="text-align:center; opacity:0.3; font-size:13px; margin-top:20px;">${q ? 'Никого не нашли' : 'Нет активных чатов'}</p>`;
        }

        toShow.forEach(id => {
            if(!allOnline[id]) return;
            const d = document.createElement('div');
            d.className = `contact ${id === targetId ? 'active' : ''}`;
            d.innerHTML = `<div class="avatar">${allOnline[id][0].toUpperCase()}</div><b>${allOnline[id]}</b>`;
            d.onclick = () => startChat(id, allOnline[id]);
            list.appendChild(d);
        });
    }

    function startChat(id, name) {
        targetId = id;
        if(!myChats.includes(id)) myChats.push(id);
        document.getElementById('cur-chat-name').innerText = name;
        document.getElementById('messages').innerHTML = '';
        document.getElementById('input-zone').style.display = 'flex';
        document.getElementById('chat-main').classList.add('open');
        refreshList();
    }

    socket.on('private message', d => {
        if(!myChats.includes(d.fromId)) { myChats.push(d.fromId); refreshList(); }
        if(d.fromId === targetId || d.isSelf) {
            const li = document.createElement('li');
            li.className = `msg ${d.isSelf ? 'me' : 'other'}`;
            li.innerText = d.text;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    });

    function send() {
        const i = document.getElementById('m');
        if(i.value && targetId) { socket.emit('private message', { toId: targetId, text: i.value }); i.value = ''; }
    }
    function goBack() { document.getElementById('chat-main').classList.remove('open'); }
    document.getElementById('m').addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
</script>
</body>
</html>
