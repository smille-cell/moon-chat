<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Chat Pro 🚀</title>
    <style>
        :root { 
            --bg: #0b0e14; 
            --glass: rgba(255, 255, 255, 0.05); 
            --accent: #64ffda; 
            --my-msg: #1d4ed8; /* Синий для твоих сообщений */
            --other-msg: rgba(255, 255, 255, 0.08); 
            --text: #e2e8f0; 
        }
        
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }

        /* Мобильный режим */
        body.mobile-mode { flex-direction: column; }
        body.mobile-mode #sidebar { width: 100%; height: auto; max-height: 80px; border-right: none; border-bottom: 1px solid var(--glass); flex-direction: row; overflow-x: auto; padding: 10px; }
        body.mobile-mode #sidebar h3 { display: none; }
        body.mobile-mode .user-item { margin: 0 5px; white-space: nowrap; padding: 8px 15px; font-size: 14px; }

        /* Экран входа */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #0b0e14 100%);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; backdrop-filter: blur(10px); width: 90%; max-width: 320px; }
        .login-box input { background: rgba(0,0,0,0.3); border: 1px solid var(--accent); color: white; padding: 15px; border-radius: 12px; width: 100%; text-align: center; margin-bottom: 15px; font-size: 16px; }
        .mobile-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 15px; padding: 10px; width: 100%; border-radius: 10px; cursor: pointer; }

        /* Боковая панель */
        #sidebar { width: 260px; background: rgba(0,0,0,0.4); border-right: 1px solid var(--glass); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .user-item { padding: 12px; margin: 5px 0; background: var(--glass); border-radius: 10px; cursor: pointer; border: 1px solid transparent; text-align: center; }
        .user-item:hover { border-color: var(--accent); }

        /* Чат и Сообщения */
        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; display: flex; flex-direction: column; }
        
        .msg { 
            padding: 12px 16px; 
            border-radius: 18px; 
            margin-bottom: 10px; 
            max-width: 75%; 
            word-wrap: break-word;
            position: relative;
            font-size: 15px;
            line-height: 1.4;
        }

        /* Чужие сообщения (слева) */
        .msg.other { align-self: flex-start; background: var(--other-msg); border-bottom-left-radius: 4px; border-left: 3px solid var(--accent); }
        
        /* Твои сообщения (справа) */
        .msg.me { align-self: flex-end; background: var(--my-msg); color: white; border-bottom-right-radius: 4px; }

        /* Поле ввода */
        .input-area { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .input-area input { flex: 1; background: var(--glass); border: 1px solid var(--glass); color: white; padding: 15px; border-radius: 15px; outline: none; font-size: 16px; }
        .input-area button { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 18px; }

        /* Окно ЛС */
        #private-window { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 400px; height: 400px; background: #161b22; border: 1px solid var(--accent);
            border-radius: 20px; flex-direction: column; z-index: 1001;
        }
    </style>
</head>
<body class="mobile-mode"> <div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--accent); margin: 0 0 20px 0;">MOON CHAT</h2>
        <input id="nickname-input" placeholder="Твой ник..." maxlength="15" autocomplete="off">
        <button onclick="startChat()" style="width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">ВОЙТИ</button>
        <button class="mobile-btn" id="toggle-mobile" onclick="toggleMobileView()">📱 РЕЖИМ: MOBILE ON</button>
    </div>
</div>

<div id="sidebar">
    <h3 style="color: var(--accent);">Орбита</h3>
    <div id="user-list"></div>
</div>

<div id="chat-area">
    <ul id="messages"></ul>
    <div class="input-area">
        <input id="m" placeholder="Сообщение..." autocomplete="off">
        <button onclick="sendGeneral()">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isMobile = true;
    let myName = "";

    function toggleMobileView() {
        isMobile = !isMobile;
        document.body.classList.toggle('mobile-mode');
        document.getElementById('toggle-mobile').innerText = isMobile ? "📱 РЕЖИМ: MOBILE ON" : "💻 РЕЖИМ: DESKTOP";
    }

    function startChat() {
        const input = document.getElementById('nickname-input');
        if (input.value.trim().length > 1) {
            myName = input.value.trim();
            document.getElementById('login-screen').style.display = 'none';
            socket.emit('set nickname', myName);
        }
    }

    function sendGeneral() {
        const input = document.getElementById('m');
        if (input.value.trim()) {
            socket.emit('chat message', { text: input.value });
            input.value = '';
        }
    }

    socket.on('chat message', (msg) => {
        const li = document.createElement('li');
        // ПРОВЕРКА: Если имя отправителя совпадает с твоим — ставим класс 'me', иначе 'other'
        const isMe = msg.user === myName;
        li.className = `msg ${isMe ? 'me' : 'other'}`;
        
        li.innerHTML = `
            <small style="display:block; font-size:10px; opacity:0.7; margin-bottom:4px;">${isMe ? 'Вы' : msg.user}</small>
            ${msg.text}
        `;
        
        const msgList = document.getElementById('messages');
        msgList.appendChild(li);
        msgList.scrollTop = msgList.scrollHeight;
    });

    socket.on('user list', (users) => {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        for (let id in users) {
            if (users[id] !== myName) {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `🛰️ ${users[id]}`;
                list.appendChild(div);
            }
        }
    });

    // Enter для отправки
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('login-screen').style.display !== 'none') startChat();
            else sendGeneral();
        }
    });
</script>
</body>
</html>
