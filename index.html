<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Messenger | Pro</title>
    <style>
        :root { --bg: #0b1118; --acc: #38bdf8; --glass: rgba(255, 255, 255, 0.03); --blur: blur(20px); --panel: rgba(23, 33, 43, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100dvh; display: flex; overflow: hidden; }

        /* ИНТРО */
        #intro { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .slide { display: none; text-align: center; animation: zoomIn 0.8s ease; }
        .slide.active { display: block; }
        .icon { font-size: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--acc)); }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }

        /* ВХОД */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle at top, #1e293b, #0b1118); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .glass-card { background: var(--glass); backdrop-filter: var(--blur); padding: 35px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 340px; text-align: center; }
        input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        .btn-p { background: var(--acc); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }

        /* ИНТЕРФЕЙС */
        #sidebar { width: 320px; background: var(--panel); backdrop-filter: var(--blur); border-right: 1px solid rgba(255,255,255,0.05); display: none; flex-direction: column; }
        #chat { flex: 1; display: none; flex-direction: column; background: #0e1621; }
        .contact { padding: 12px 15px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--acc); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }

        /* СООБЩЕНИЯ */
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 10px 14px; border-radius: 16px; max-width: 80%; font-size: 15px; position: relative; }
        .me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 4px; }
        .ot { align-self: flex-start; background: #182533; border-bottom-left-radius: 4px; }
        .m img, .m video { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .del-msg { font-size: 10px; color: #ff4d4d; cursor: pointer; display: none; margin-top: 5px; }
        .me:hover .del-msg { display: block; }

        @media (max-width: 600px) {
            #sidebar { width: 100%; }
            #sidebar.hide { display: none; }
            #chat { display: none; position: fixed; inset: 0; z-index: 100; }
            #chat.active { display: flex; }
        }
    </style>
</head>
<body>

<div id="intro">
    <div class="slide active" id="s1"><div class="icon">🛰️</div><h2>Moon Messenger</h2><p>Будущее связи</p></div>
    <div class="slide" id="s2"><div class="icon">💎</div><h2>Glass UI</h2><p>Чистый стиль</p></div>
    <div class="slide" id="s3"><div class="icon">🌕</div><h2>Поехали</h2></div>
</div>

<div id="auth-screen">
    <div class="glass-card">
        <h2 id="at">Вход</h2>
        <input id="u" placeholder="Логин">
        <input id="p" type="password" placeholder="Пароль">
        <button class="btn-p" onclick="auth()">ВОЙТИ</button>
        <p onclick="sw()" id="as" style="font-size:11px; color:var(--acc); cursor:pointer; margin-top:15px;">Создать аккаунт</p>
    </div>
</div>

<div id="sidebar">
    <div style="padding:15px; font-weight:bold; color:var(--acc);">MOON CHATS</div>
    <div id="u-list" style="overflow-y:auto; flex:1;"></div>
</div>

<div id="chat">
    <div style="padding:15px; background:var(--panel); display:flex; align-items:center; justify-content:space-between;">
        <div style="display:flex; align-items:center;">
            <button onclick="closeC()" id="back-btn" style="display:none; background:none; border:none; color:var(--acc); font-size:24px; margin-right:10px;">←</button>
            <b id="c-name">Чат</b>
        </div>
    </div>
    <div id="msgs"></div>
    <div style="padding:15px; background:var(--panel); display:flex; align-items:center; gap:10px;">
        <label for="f-in" style="cursor:pointer; font-size:22px;">📎</label>
        <input type="file" id="f-in" style="display:none" onchange="upF(this)">
        <input id="m" placeholder="Сообщение..." style="margin:0; border-radius:20px;">
        <button onclick="send()" style="background:none; border:none; color:var(--acc); font-size:24px;">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isReg = false, myName = localStorage.getItem('m_user') || "", tId = "", online = {};
    let history = JSON.parse(localStorage.getItem('m_hist') || '{}');

    // АНИМАЦИЯ И СЕССИЯ
    if(!myName) {
        let st = 1;
        const it = setInterval(() => {
            document.getElementById(`s${st}`).classList.remove('active');
            st++;
            if(st > 3) {
                clearInterval(it);
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => { document.getElementById('intro').remove(); document.getElementById('auth-screen').style.display = 'flex'; }, 800);
            } else { document.getElementById(`s${st}`).classList.add('active'); }
        }, 1500);
    } else {
        document.getElementById('intro').remove();
        socket.emit('set nickname', myName);
        showUI();
    }

    function sw() { isReg = !isReg; document.getElementById('at').innerText = isReg ? "Регистрация" : "Вход"; }
    function auth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(u && p) socket.emit('auth', { username: u, password: p, isReg: isReg });
    }

    socket.on('auth success', n => { localStorage.setItem('m_user', n); location.reload(); });
    socket.on('auth error', m => alert(m));
    socket.on('user list', u => { online = u; draw(); });

    function showUI() {
        document.getElementById('sidebar').style.display = 'flex';
        if(window.innerWidth > 600) document.getElementById('chat').style.display = 'flex';
    }

    function draw() {
        const l = document.getElementById('u-list'); l.innerHTML = '';
        addU('saved_messages', '⭐ Избранное', true);
        addU('group_global', '🌍 Общий чат', true);
        Object.keys(online).forEach(id => {
            if(online[id] !== myName) addU(id, online[id]);
        });
    }

    function addU(id, name, sp = false) {
        const d = document.createElement('div'); d.className = 'contact';
        d.innerHTML = `<div class="avatar" style="${sp?'background:#facc15':''}">${name[0]}</div><b>${name}</b>`;
        d.onclick = () => {
            if(tId === id && document.getElementById('chat').classList.contains('active')) return;
            tId = id; document.getElementById('c-name').innerText = name;
            document.getElementById('msgs').innerHTML = '';
            document.getElementById('chat').classList.add('active');
            document.getElementById('sidebar').classList.add('hide');
            if(window.innerWidth < 600) document.getElementById('back-btn').style.display = 'block';
            
            const key = sp ? id : (online[id] || id);
            if(history[key]) history[key].forEach(m => render(m));
        };
        document.getElementById('u-list').appendChild(d);
    }

    function upF(el) {
        const f = el.files[0]; if(!f || !tId) return;
        const r = new FileReader();
        r.onload = e => {
            const type = f.type.split('/')[0];
            socket.emit('private message', { toId: tId, text: f.name, fileData: e.target.result, fileType: type });
        };
        r.readAsDataURL(f);
    }

    function send() {
        const i = document.getElementById('m');
        if(!i.value || !tId) return;
        if(tId === 'saved_messages') {
            const d = { text: i.value, isSelf: true, fromName: 'Я', msgId: Date.now() };
            render(d); saveM('saved_messages', d);
        } else {
            socket.emit('private message', { toId: tId, text: i.value });
        }
        i.value = '';
    }

    socket.on('private message', d => {
        const key = d.toId === 'group_global' ? 'group_global' : (d.isSelf ? (online[d.toId] || d.toId) : d.fromName);
        saveM(key, d);
        if(tId === d.fromId || tId === d.toId || (tId === 'group_global' && d.toId === 'group_global')) render(d);
    });

    socket.on('delete message', d => {
        const el = document.querySelector(`[data-id="${d.msgId}"]`);
        if(el) el.innerHTML = '<i style="opacity:0.4">Удалено у всех</i>';
        Object.keys(history).forEach(k => history[k] = history[k].filter(m => m.msgId != d.msgId));
        localStorage.setItem('m_hist', JSON.stringify(history));
    });

    function saveM(k, d) {
        if(!history[k]) history[k] = [];
        history[k].push(d);
        if(history[k].length > 100) history[k].shift();
        localStorage.setItem('m_hist', JSON.stringify(history));
    }

    function render(d) {
        const m = document.createElement('div');
        m.className = `m ${d.isSelf?'me':'ot'}`;
        m.setAttribute('data-id', d.msgId);
        let c = d.text;
        if(d.fileData) {
            if(d.fileType === 'image') c = `<img src="${d.fileData}">`;
            else if(d.fileType === 'video') c = `<video src="${d.fileData}" controls></video>`;
            else c = `<a href="${d.fileData}" download="${d.text}" style="color:white">📄 ${d.text}</a>`;
        }
        m.innerHTML = `<small style="display:block;font-size:10px;opacity:0.5">${d.fromName || 'Я'}</small>${c}
                       ${d.isSelf ? `<div class="del-msg" onclick="socket.emit('delete message',{msgId:${d.msgId}})">Удалить у всех</div>`:''}`;
        document.getElementById('msgs').appendChild(m);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    function closeC() { tId = ""; document.getElementById('chat').classList.remove('active'); document.getElementById('sidebar').classList.remove('hide'); }
</script>
</body>
</html>
