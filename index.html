<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Messenger</title>
    <style>
        :root { --bg: #0b0e14; --sidebar-bg: #17212b; --chat-bg: #0e1621; --accent: #38bdf8; --text: #f5f5f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; height: 100dvh; display: flex; overflow: hidden; }

        /* ИНТРО */
        #intro-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.6s; }
        .intro-slide { display: none; text-align: center; animation: fadeInUp 0.5s; }
        .intro-slide.active { display: block; }
        .intro-icon { font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent)); }
        
        .btn-group { display: none; flex-direction: column; gap: 10px; margin-top: 30px; width: 100%; max-width: 280px; }
        .btn-p { padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .btn-s { padding: 12px; border-radius: 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ВХОД */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2500; display: none; align-items: center; justify-content: center; }
        .auth-box { width: 90%; max-width: 320px; text-align: center; }
        input { background: #242f3d; border: 1px solid #2f3947; color: #fff; padding: 14px; border-radius: 10px; width: 100%; margin-bottom: 10px; outline: none; }

        /* ЧАТ */
        #sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid #101921; display: none; flex-direction: column; }
        #chat-main { flex: 1; background: var(--chat-bg); display: none; flex-direction: column; }
        
        .contact { padding: 12px 15px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .contact:hover { background: #2b3948; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; list-style: none; margin: 0; }
        .msg { padding: 8px 14px; border-radius: 12px; max-width: 80%; font-size: 15px; }
        .msg.me { align-self: flex-end; background: #2b5278; }
        .msg.other { align-self: flex-start; background: #182533; }

        .input-area { padding: 10px; display: flex; gap: 10px; background: var(--sidebar-bg); }

        @media (max-width: 600px) {
            #sidebar { width: 100%; }
            #chat-main { display: none; position: fixed; inset: 0; z-index: 100; }
            #chat-main.open { display: flex; }
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div class="intro-slide active" id="s1"><div class="intro-icon">🛡️</div><h2>Конфиденциально</h2></div>
    <div class="intro-slide" id="s2"><div class="intro-icon">🚀</div><h2>Мгновенно</h2></div>
    <div class="intro-slide" id="s3"><div class="intro-icon">🌕</div><h2>Moon Chat</h2></div>
    <div class="btn-group" id="intro-btns">
        <button class="btn-p" onclick="goAuth(true)">СОЗДАТЬ АККАУНТ</button>
        <button class="btn-s" onclick="goAuth(false)">УЖЕ БЫЛИ С НАМИ? ВОЙТИ</button>
    </div>
</div>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="a-t">ВХОД</h2>
        <input id="u" placeholder="Логин">
        <input id="p" type="password" placeholder="Пароль">
        <button class="btn-p" style="width:100%" onclick="auth()">ПРОДОЛЖИТЬ</button>
        <p onclick="sw()" id="a-h" style="color:var(--accent); cursor:pointer; font-size:13px; margin-top:15px;">Создать аккаунт</p>
    </div>
</div>

<div id="sidebar">
    <div style="padding:10px;"><input id="search" placeholder="Поиск людей..." oninput="upd()"></div>
    <div id="list"></div>
</div>

<div id="chat-main">
    <div style="padding:10px 15px; background:var(--sidebar-bg); display:flex; align-items:center;">
        <button onclick="back()" id="b-b" style="display:none; background:none; border:none; color:var(--accent); font-size:20px; margin-right:10px;">←</button>
        <b id="c-n">Выберите чат</b>
    </div>
    <ul id="messages"></ul>
    <div class="input-area" id="i-z" style="display:none">
        <input id="m" placeholder="Сообщение..." style="margin:0; border-radius:20px;">
        <button onclick="send()" style="background:none; border:none; color:var(--accent); font-size:24px;">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isR = false, myN = "", tId = "", online = {}, chats = [];

    let sl = 1;
    const t = setInterval(() => {
        document.getElementById(`s${sl}`).classList.remove('active');
        if(++sl > 3) { clearInterval(t); document.getElementById('s3').classList.add('active'); document.getElementById('intro-btns').style.display='flex'; }
        else document.getElementById(`s${sl}`).classList.add('active');
    }, 1500);

    function goAuth(r) { isR = r; ui(); document.getElementById('intro-overlay').remove(); document.getElementById('auth-screen').style.display='flex'; }
    function sw() { isR = !isR; ui(); }
    function ui() { document.getElementById('a-t').innerText = isR ? "РЕГИСТРАЦИЯ" : "ВХОД"; document.getElementById('a-h').innerText = isR ? "Уже есть аккаунт? Войти" : "Создать аккаунт"; }

    function auth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(u && p) socket.emit('auth', { username: u, password: p, isReg: isR });
    }

    socket.on('auth success', n => {
        myN = n; document.getElementById('auth-screen').remove();
        document.getElementById('sidebar').style.display = 'flex';
        if(window.innerWidth > 600) document.getElementById('chat-main').style.display = 'flex';
        socket.emit('set nickname', myN);
    });

    socket.on('auth error', m => alert(m));
    socket.on('user list', u => { online = u; upd(); });

    function upd() {
        const q = document.getElementById('search').value.toLowerCase();
        const l = document.getElementById('list'); l.innerHTML = '';
        let show = q ? Object.keys(online).filter(id => online[id] !== myN && online[id].toLowerCase().includes(q)) : chats;
        show.forEach(id => {
            if(!online[id]) return;
            const d = document.createElement('div'); d.className = 'contact';
            d.innerHTML = `<div class="avatar">${online[id][0]}</div><b>${online[id]}</b>`;
            d.onclick = () => { tId = id; if(!chats.includes(id)) chats.push(id); document.getElementById('c-n').innerText = online[id]; document.getElementById('messages').innerHTML = ''; document.getElementById('i-z').style.display='flex'; document.getElementById('chat-main').classList.add('open'); document.getElementById('b-b').style.display='block'; upd(); };
            l.appendChild(d);
        });
    }

    socket.on('private message', d => {
        if(!chats.includes(d.fromId)) { chats.push(d.fromId); upd(); }
        if(d.fromId === tId || d.isSelf) {
            const li = document.createElement('li'); li.className = `msg ${d.isSelf?'me':'other'}`; li.innerText = d.text;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    });

    function send() { const i = document.getElementById('m'); if(i.value && tId) { socket.emit('private message', { toId: tId, text: i.value }); i.value = ''; } }
    function back() { document.getElementById('chat-main').classList.remove('open'); }
</script>
</body>
</html>
