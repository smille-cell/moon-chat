<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Messenger</title>
    <style>
        :root { --bg: #0b1118; --acc: #38bdf8; --glass: rgba(255, 255, 255, 0.03); --blur: blur(25px); --panel: rgba(23, 33, 43, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100dvh; display: flex; overflow: hidden; }

        /* АНИМАЦИЯ НАЧАЛА */
        #intro { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 1s ease; }
        .logo-ani { text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }

        /* ИНТЕРФЕЙС */
        #profile-drawer { position: fixed; left: -310px; top: 0; bottom: 0; width: 280px; background: var(--panel); backdrop-filter: var(--blur); z-index: 5000; transition: 0.4s; border-right: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        #profile-drawer.open { left: 0; }
        .p-ava { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--acc); object-fit: cover; cursor: pointer; }
        
        #auth-screen { position: fixed; inset: 0; background: #0b1118; z-index: 4000; display: none; align-items: center; justify-content: center; }
        .glass { background: var(--glass); backdrop-filter: var(--blur); padding: 30px; border-radius: 25px; width: 90%; max-width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        .btn { background: var(--acc); color: #000; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        #sidebar { width: 320px; background: var(--panel); backdrop-filter: var(--blur); border-right: 1px solid rgba(255,255,255,0.05); display: none; flex-direction: column; }
        .contact { padding: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .contact:hover { background: rgba(255,255,255,0.05); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; object-fit: cover; }

        #chat { flex: 1; display: none; flex-direction: column; background: #0e1621; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; }
        .me { align-self: flex-end; background: #2b5278; }
        .ot { align-self: flex-start; background: #182533; }

        @media (max-width: 600px) {
            #sidebar { width: 100%; }
            #sidebar.hide { display: none; }
            #chat { display: none; position: fixed; inset: 0; z-index: 100; }
            #chat.active { display: flex; }
        }
    </style>
</head>
<body>

<div id="intro">
    <div class="logo-ani">
        <div style="font-size: 70px;">🌕</div>
        <h2 style="letter-spacing: 5px;">MOON</h2>
    </div>
</div>

<div id="profile-drawer">
    <input type="file" id="ava-up" hidden onchange="changeAva(this)">
    <img id="my-ava" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="p-ava" onclick="document.getElementById('ava-up').click()">
    <h3 id="my-name">User</h3>
    <button onclick="localStorage.clear(); location.reload()" style="margin-top:auto; color:red; background:none; border:none; cursor:pointer;">Выйти</button>
</div>

<div id="auth-screen">
    <div class="glass">
        <h2 id="at">Moon Login</h2>
        <input id="u" placeholder="Логин">
        <input id="p" type="password" placeholder="Пароль">
        <button class="btn" onclick="auth()">ВОЙТИ</button>
        <p onclick="isReg=!isReg; document.getElementById('at').innerText=isReg?'Регистрация':'Вход'" style="cursor:pointer; font-size:12px; color:var(--acc); margin-top:10px;">Создать аккаунт</p>
    </div>
</div>

<div id="sidebar">
    <div style="padding: 20px; display: flex; align-items: center; gap: 15px;">
        <div onclick="document.getElementById('profile-drawer').classList.toggle('open')" style="cursor:pointer; color:var(--acc); font-size:20px;">☰</div>
        <b>MOON</b>
    </div>
    <div style="padding: 0 15px 10px;">
        <input id="search" placeholder="Ник собеседника..." oninput="draw()" style="margin:0;">
    </div>
    <div id="u-list" style="overflow-y:auto; flex:1;"></div>
</div>

<div id="chat">
    <div style="padding:15px; background:var(--panel); display:flex; align-items:center;">
        <button onclick="closeC()" style="background:none; border:none; color:var(--acc); font-size:20px; margin-right:10px;">←</button>
        <b id="c-name">Чат</b>
    </div>
    <div id="msgs"></div>
    <div style="padding:15px; background:var(--panel); display:flex; gap:10px;">
        <input id="m" placeholder="Сообщение..." style="margin:0; border-radius:20px;">
        <button onclick="send()" style="background:none; border:none; color:var(--acc); font-size:25px;">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let isReg = false, myName = localStorage.getItem('m_user') || "", tId = "", online = {};
    let myContacts = JSON.parse(localStorage.getItem('m_contacts') || '[]');
    let history = JSON.parse(localStorage.getItem('m_hist') || '{}');
    let myAva = localStorage.getItem('m_ava') || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    window.onload = () => {
        if(myName) {
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => { document.getElementById('intro').remove(); showUI(); }, 800);
            }, 1500);
            socket.emit('set nickname', myName);
            document.getElementById('my-name').innerText = myName;
            document.getElementById('my-ava').src = myAva;
        } else {
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => { document.getElementById('intro').remove(); document.getElementById('auth-screen').style.display = 'flex'; }, 800);
            }, 2000);
        }
    };

    function auth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(u && p) socket.emit('auth', { username: u, password: p, isReg: isReg });
    }
    socket.on('auth success', n => { localStorage.setItem('m_user', n); location.reload(); });
    socket.on('auth error', m => alert(m));
    socket.on('user list', u => { online = u; draw(); });

    function showUI() {
        document.getElementById('sidebar').style.display = 'flex';
        if(window.innerWidth > 600) document.getElementById('chat').style.display = 'flex';
    }

    function draw() {
        const q = document.getElementById('search').value.toLowerCase().trim();
        const l = document.getElementById('u-list'); l.innerHTML = '';
        
        // 1. Избранное всегда в топе
        addU('saved_messages', '⭐ Избранное', true);

        // 2. Те, с кем уже есть контакт
        myContacts.forEach(name => {
            const id = Object.keys(online).find(k => online[k].name === name);
            if (id && name !== myName && (name.toLowerCase().includes(q) || q === "")) {
                addU(id, name, false, online[id].avatar);
            }
        });

        // 3. Поиск нового (только если ввели ник)
        if (q !== "") {
            Object.keys(online).forEach(id => {
                const name = online[id].name;
                if (name !== myName && name.toLowerCase().includes(q) && !myContacts.includes(name)) {
                    const d = document.createElement('div');
                    d.className = 'contact';
                    d.style.borderLeft = '4px solid var(--acc)';
                    d.innerHTML = `<img src="${online[id].avatar}" class="avatar"><b>${name} <small>(Найти)</small></b>`;
                    d.onclick = () => { tId = id; openChat(id, name); };
                    l.appendChild(d);
                }
            });
        }
    }

    function addU(id, name, sp = false, ava = "") {
        const d = document.createElement('div');
        d.className = 'contact';
        const img = sp ? `<div class="avatar" style="background:var(--acc); display:flex; align-items:center; justify-content:center; color:#000;">⭐</div>` : `<img src="${ava}" class="avatar">`;
        d.innerHTML = `${img}<b>${name}</b>`;
        d.onclick = () => openChat(id, name);
        document.getElementById('u-list').appendChild(d);
    }

    function openChat(id, name) {
        tId = id;
        document.getElementById('c-name').innerText = name;
        document.getElementById('msgs').innerHTML = '';
        document.getElementById('chat').classList.add('active');
        document.getElementById('sidebar').classList.add('hide');
        if (history[name]) history[name].forEach(m => render(m));
        document.getElementById('profile-drawer').classList.remove('open');
    }

    function send() {
        const i = document.getElementById('m');
        if(!i.value || !tId) return;
        
        if(tId === 'saved_messages') {
            const d = { text: i.value, isSelf: true, fromName: 'Я', msgId: Date.now() };
            render(d); saveM('saved_messages', d);
        } else {
            const partnerName = document.getElementById('c-name').innerText;
            if(!myContacts.includes(partnerName)) {
                myContacts.push(partnerName);
                localStorage.setItem('m_contacts', JSON.stringify(myContacts));
            }
            socket.emit('private message', { toId: tId, text: i.value });
        }
        i.value = '';
    }

    socket.on('private message', d => {
        if(!d.isSelf && d.fromName && !myContacts.includes(d.fromName)) {
            myContacts.push(d.fromName);
            localStorage.setItem('m_contacts', JSON.stringify(myContacts));
            draw();
        }
        const key = d.isSelf ? document.getElementById('c-name').innerText : d.fromName;
        saveM(key, d);
        if(key === document.getElementById('c-name').innerText) render(d);
    });

    function saveM(k, d) {
        if(!history[k]) history[k] = [];
        history[k].push(d);
        localStorage.setItem('m_hist', JSON.stringify(history));
    }

    function render(d) {
        const m = document.createElement('div');
        m.className = `m ${d.isSelf?'me':'ot'}`;
        m.innerHTML = `<small style="display:block; font-size:10px; opacity:0.5;">${d.fromName}</small>${d.text}`;
        document.getElementById('msgs').appendChild(m);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    function changeAva(el) {
        const reader = new FileReader();
        reader.onload = e => {
            myAva = e.target.result;
            document.getElementById('my-ava').src = myAva;
            localStorage.setItem('m_ava', myAva);
            socket.emit('update avatar', { avatar: myAva });
        };
        reader.readAsDataURL(el.files[0]);
    }

    function closeC() { document.getElementById('chat').classList.remove('active'); document.getElementById('sidebar').classList.remove('hide'); }
</script>
</body>
</html>
